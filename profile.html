<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hồ sơ năng lực · Sapo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#007AFF;--green:#16D865;--berkeley:#0F1437;--offblue:#F0F4F9;--gray:#5B6472;--line:#E2E9F2}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--offblue);color:#1F2533}
  .wrap{max-width:980px;margin:0 auto;padding:0 16px 70px}
  header.h{background:var(--berkeley);color:#fff;padding:18px 0}
  header.h .wrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{font-weight:700;display:flex;align-items:center;gap:9px}
  .dot{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--green))}
  .me{margin-left:auto;font-size:13px;color:#c7d2e8}.me a{color:#9ECCFF;cursor:pointer}
  .hero{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-top:18px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .avatar{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;flex:none}
  .hero h1{margin:0;font-size:22px;color:var(--berkeley)}
  .hero .sub{color:var(--gray);font-size:14px;margin-top:3px}
  .pill{display:inline-block;background:var(--offblue);color:var(--blue);font-weight:600;font-size:12.5px;padding:3px 11px;border-radius:20px;margin-right:6px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
  .card h3{margin:0 0 12px;font-size:16px;color:var(--berkeley)}
  .big{font-size:30px;font-weight:700;color:var(--blue)}
  table{border-collapse:collapse;width:100%;font-size:14px}
  th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--gray);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.3px}
  td.amount{text-align:right;font-weight:600;color:var(--berkeley)}
  .muted{color:var(--gray);font-size:13px}
  .loading{padding:50px;text-align:center;color:var(--gray)}
  .center{max-width:440px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center}
  .barrow{display:flex;align-items:center;gap:10px;margin:7px 0}
  .barrow .lab{width:110px;font-size:13px;color:var(--berkeley);font-weight:600}
  .mini{flex:1;height:11px;background:var(--offblue);border-radius:7px;overflow:hidden}
  .minif{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}
  .barrow .v{width:54px;text-align:right;font-size:13px;color:var(--gray)}
  a.back{color:#9ECCFF;text-decoration:none}
</style>
</head>
<body>
<header class="h"><div class="wrap">
  <div class="logo"><span class="dot"></span> Hồ sơ năng lực</div>
  <div class="me" id="me"></div>
</div></header>
<main class="wrap" id="root"><div class="loading">Đang tải…</div></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="framework-data.js"></script>
<script>
  var sb = supabase.createClient(SUPA.URL, SUPA.ANON_KEY);
  var ME=null;
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function vnd(n){ n=Number(n)||0; return n.toLocaleString('vi-VN')+' đ'; }
  function short(n){ n=Number(n)||0; if(n>=1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/,'')+' tỷ'; if(n>=1e6) return Math.round(n/1e6)+'tr'; return n.toLocaleString('vi-VN'); }
  function tr1(n){ return (Math.round((Number(n)||0)/1e6*10)/10).toFixed(1)+'tr'; }
  function notAllowed(m){ document.getElementById('root').innerHTML='<div class="center"><h2>Không xem được</h2><p class="muted">'+esc(m)+'</p></div>'; }
  function param(k){ return new URLSearchParams(location.search).get(k); }

  sb.auth.getSession().then(function(r){
    var s=r.data.session;
    if(!s){ notAllowed('Bạn chưa đăng nhập. Hãy đăng nhập ở trang chính rồi quay lại.'); return; }
    ME=s.user;
    document.getElementById('me').innerHTML='<a class="back" href="dashboard.html">← Dashboard</a> · <b style="color:#fff">'+esc(ME.email)+'</b> · <a id="lo">Đăng xuất</a>';
    document.getElementById('lo').onclick=function(){ sb.auth.signOut().then(function(){ location.replace('login.html'); }); };
    var target=(param('email')||ME.email).toLowerCase();
    loadProfile(target);
  });

  function loadProfile(email){
    document.getElementById('root').innerHTML='<div class="loading">Đang tải hồ sơ…</div>';
    // danh tính lấy từ role_assignments (có sẵn cả người chưa đăng nhập); RLS chặn nếu không có quyền xem
    sb.from('role_assignments').select('email,full_name,role,level,dept').eq('email',email).maybeSingle().then(function(pr){
      if(pr.error){ notAllowed('Lỗi: '+pr.error.message); return; }
      var prof = pr.data;
      if(!prof){ notAllowed('Bạn không có quyền xem hồ sơ này, hoặc email không có trong danh sách.'); return; }
      var lvl = prof.level || 'c1';
      Promise.all([
        sb.from('checklist_items').select('id,part,sort').eq('level',lvl).order('sort'),
        sb.from('progress').select('item_key,done').eq('email',email),
        sb.from('revenues').select('period,amount,soft,hard,other,merchants,dept,renew').eq('email',email).order('period',{ascending:false}),
        sb.from('competencies').select('id,domain,name,sort').order('sort'),
        sb.from('competency_scores').select('competency_id,score').eq('email',email),
        sb.from('role_assignments').select('level,dept').eq('email',ME.email.toLowerCase()).maybeSingle(),
        sb.from('mentorships').select('mentee_name,status').eq('mentor_email',email),
        prof.dept ? sb.from('revenues').select('email,period,amount').eq('dept',prof.dept) : Promise.resolve({data:[]})
      ]).then(function(res){
        var items=(res[0].data||[]), prog=(res[1].data||[]), revs=(res[2].data||[]);
        var comps=(res[3].data||[]), scoreRows=(res[4].data||[]), my=(res[5]&&res[5].data)||{};
        var mentors=(res[6]&&res[6].data)||[], peers=(res[7]&&res[7].data)||[];
        var scores={}; scoreRows.forEach(function(x){ scores[x.competency_id]=x.score; });
        var canEdit = (my.level==='c4') || (my.level==='c3' && my.dept && my.dept===prof.dept);
        render(prof, lvl, items, prog, revs, comps, scores, canEdit, email, mentors, peers);
      });
    });
  }

  function render(prof, lvl, items, prog, revs, comps, scores, canEdit, email, mentors, peers){
    mentors=mentors||[]; peers=peers||[];
    var LV={c1:'Nhân viên',c2:'Chuyên gia',c3:'Trưởng phòng',c4:'Giám đốc Trung tâm'};
    var doneSet={}; prog.forEach(function(p){ if(p.done) doneSet[p.item_key]=1; });
    var KEY=function(id){ return lvl+'_ck_'+id; };
    // % theo 3 phần
    var partTotal={}, partDone={}, order=[];
    items.forEach(function(it){
      var pt=it.part||'(khác)';
      if(order.indexOf(pt)===-1){ order.push(pt); partTotal[pt]=0; partDone[pt]=0; }
      partTotal[pt]++; if(doneSet[KEY(it.id)]) partDone[pt]++;
    });
    var totalAll=items.length, doneAll=0; items.forEach(function(it){ if(doneSet[KEY(it.id)]) doneAll++; });
    var pctAll= totalAll? Math.round(doneAll/totalAll*100):0;
    var labels=order, data=order.map(function(p){ return partTotal[p]? Math.round(partDone[p]/partTotal[p]*100):0; });

    var initials=(prof.full_name||prof.email||'?').trim().split(/\s+/).slice(-1)[0].charAt(0).toUpperCase();
    var html=''
      +'<div class="hero"><div class="avatar">'+esc(initials)+'</div>'
      +'<div><h1>'+esc(prof.full_name||prof.email)+'</h1>'
      +'<div class="sub">'+esc(prof.email)+'</div>'
      +'<div style="margin-top:8px"><span class="pill">'+esc(LV[prof.level]||prof.level||'—')+'</span>'
      +'<span class="pill">'+esc(prof.dept||'—')+'</span>'
      +'<span class="pill">Thành thạo '+pctAll+'%</span></div></div></div>';

    html+='<div class="grid">'
      +'<div class="card"><h3>Kiến thức kỹ năng (checklist)</h3><canvas id="radar" height="240"></canvas>'
      + order.map(function(p,i){ return '<div class="barrow"><span class="lab">'+esc(p)+'</span><div class="mini"><div class="minif" style="width:'+data[i]+'%"></div></div><span class="v">'+data[i]+'%</span></div>'; }).join('')
      +'</div>'
      +'<div class="card"><h3>Doanh thu theo tháng</h3>'
      + (revs.length? '<table><tr><th>Tháng</th><th style="text-align:right">Doanh thu</th></tr>'
          + revs.map(function(r){ return '<tr><td>'+esc(r.period)+'</td><td class="amount">'+vnd(r.amount)+'</td></tr>'; }).join('')
          + '</table>'
          : '<p class="muted">Chưa có dữ liệu doanh thu. Quản lý nhập ở trang Admin → Doanh thu.</p>')
      +'</div></div>';

    // Tổng quan năng lực (5 mảng, mỗi cấp 25%) — tính từ tick
    var _done={}; prog.forEach(function(p){ if(p.done)_done[p.item_key]=true; });
    var _ckTotal=items.length||71, _D1='Kiến thức kỹ năng chuyên môn';
    var _byDom={}, _order=[]; (comps||[]).forEach(function(c){ if(_order.indexOf(c.domain)<0)_order.push(c.domain); (_byDom[c.domain]=_byDom[c.domain]||[]).push(c); });
    function _ckFrac(){ var n=0; for(var k in _done){ if(k.indexOf('clf_c1_ck_')===0)n++; } return _ckTotal?Math.min(1,n/_ckTotal):0; }
    var _W={c1:0.80,c2:0.10,c3:0.05,c4:0.05};
    var _ds=_order.map(function(dom){ var cs=_byDom[dom],sum=0; ['c1','c2','c3','c4'].forEach(function(lv){ var f; if(dom===_D1&&lv==='c1'){f=_ckFrac();} else { var dn=0; cs.forEach(function(c){ if(_done['clf_'+lv+'_comp_'+c.id])dn++; }); f=cs.length?dn/cs.length:0; } sum+=_W[lv]*f; }); return {domain:dom,pct:Math.round(sum*100)}; });
    html+='<div class="card" style="margin-top:16px"><h3>Tổng quan năng lực (5 mảng)</h3>'
      +'<div class="muted" style="margin-bottom:6px">Đạt chuẩn Nhân viên = 80%, Chuyên gia 90%, Trưởng phòng 95%, GĐ 100%. Tự cập nhật khi tick chuẩn ở các trang cấp.</div>'
      +'<div class="grid"><div><canvas id="radar2" height="300"></canvas></div><div>'
      + _ds.map(function(x){ return '<div style="margin:8px 0"><div style="display:flex;justify-content:space-between;font-size:13px"><b>'+esc(x.domain)+'</b><span class="muted">'+x.pct+'%</span></div><div style="height:10px;background:#F0F4F9;border-radius:6px;overflow:hidden;margin-top:4px"><div style="height:100%;background:linear-gradient(90deg,#007AFF,#16D865);width:'+x.pct+'%"></div></div></div>'; }).join('')
      +'</div></div></div>';

    // ===== 4 dashboard tự soi (quản lý xem) =====
    function pbar(p,c){ p=Math.max(0,Math.min(100,Math.round(p))); return '<div style="height:11px;background:#F0F4F9;border-radius:7px;overflow:hidden"><div style="height:100%;width:'+p+'%;background:'+(c||'linear-gradient(90deg,#007AFF,#16D865)')+'"></div></div>'; }
    var msP={}; revs.forEach(function(r){ msP[r.period]=1; }); var msArr=Object.keys(msP).sort(); var nM=msArr.length, lpr=msArr[msArr.length-1];
    var cum={total:0,soft:0,hard:0,other:0,merch:0,renew:0}; revs.forEach(function(r){ cum.total+=Number(r.amount)||0; cum.soft+=Number(r.soft)||0; cum.hard+=Number(r.hard)||0; cum.other+=Number(r.other)||0; cum.merch+=Number(r.merchants)||0; cum.renew+=Number(r.renew)||0; });
    var _btot=(cum.soft+cum.hard+cum.other)||1, _pc=function(x){return Math.round(x/_btot*100);};
    html+='<div class="card" style="margin-top:16px"><h3>Doanh thu bóc tách (luỹ kế '+nM+' tháng)</h3>'
      +'<div style="display:flex;height:16px;border-radius:6px;overflow:hidden;margin-bottom:12px"><div style="width:'+_pc(cum.soft)+'%;background:#1D9E75"></div><div style="width:'+_pc(cum.hard)+'%;background:#378ADD"></div><div style="width:'+_pc(cum.other)+'%;background:#EF9F27"></div></div>'
      +'<div class="grid" style="margin-top:0"><div style="background:#F0F4F9;border-radius:10px;padding:10px"><div class="muted"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#1D9E75;margin-right:5px"></span>Mềm</div><div style="font-weight:700">'+short(cum.soft)+' · '+_pc(cum.soft)+'%</div></div>'
      +'<div style="background:#F0F4F9;border-radius:10px;padding:10px"><div class="muted"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#378ADD;margin-right:5px"></span>Cứng</div><div style="font-weight:700">'+short(cum.hard)+' · '+_pc(cum.hard)+'%</div></div>'
      +'<div style="background:#F0F4F9;border-radius:10px;padding:10px"><div class="muted"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#EF9F27;margin-right:5px"></span>Khác</div><div style="font-weight:700">'+short(cum.other)+' · '+_pc(cum.other)+'%</div></div></div></div>';
    // mạnh/yếu + việc nên làm
    var _sorted=_ds.slice().sort(function(a,b){return a.pct-b.pct;}), weak=_sorted[0], strong=_sorted[_sorted.length-1], acts=[];
    if(weak){ if(weak.domain===_D1){ var CK=(window.CLF&&CLF.CHECKLISTS&&CLF.CHECKLISTS.c1)||null; if(CK){ for(var pi=0;pi<CK.length&&acts.length<3;pi++){ var pp=CK[pi]; for(var ci=0;ci<pp.categories.length&&acts.length<3;ci++){ var cat=pp.categories[ci]; for(var ii=0;ii<cat.items.length&&acts.length<3;ii++){ if(!_done['clf_c1_ck_'+pi+'_'+ci+'_'+ii]) acts.push(cat.items[ii].n); } } } } } else { var cmps=(comps||[]).filter(function(c){return c.domain===weak.domain;}); for(var i=0;i<cmps.length&&acts.length<3;i++){ if(!_done['clf_c1_comp_'+cmps[i].id]) acts.push(cmps[i].name); } } }
    html+='<div class="card" style="margin-top:16px"><h3>Điểm mạnh · điểm cần cải thiện</h3>'
      +'<div class="grid" style="margin-top:0"><div style="background:#EAF7EE;border-radius:10px;padding:12px"><div class="muted">Mạnh nhất</div><div style="font-weight:700;color:#0a8a3a">'+(strong?esc(strong.domain)+' · '+strong.pct+'%':'—')+'</div></div>'
      +'<div style="background:#FFF3E6;border-radius:10px;padding:12px"><div class="muted">Cần cải thiện</div><div style="font-weight:700;color:#9a6a00">'+(weak?esc(weak.domain)+' · '+weak.pct+'%':'—')+'</div></div></div>'
      +'<div style="margin-top:12px;font-weight:600;font-size:13px">3 việc nên làm tiếp'+(weak?' ('+esc(weak.domain)+')':'')+'</div>'
      +(acts.length? '<ul style="margin:6px 0 0;padding-left:18px">'+acts.map(function(a){return '<li style="margin:3px 0">'+esc(a)+'</li>';}).join('')+'</ul>' : '<div class="muted">Đã hoàn thành mảng này 🎉</div>')
      +'</div>';
    // tiến độ lên cấp
    var dtmStd=50000000*nM, dtmPct=dtmStd?cum.soft/dtmStd*100:0;
    var lpNum=parseInt((lpr||'').split('-')[1],10)||0, half=lpNum<=6?1:2, expStd=500000000*half, expCum=0;
    revs.forEach(function(r){ var mn=parseInt((r.period||'').split('-')[1],10)||0; if(half===1?mn<=6:true) expCum+=Number(r.amount)||0; });
    var expPct=expStd?expCum/expStd*100:0, official=mentors.filter(function(m){return (m.status||'').toLowerCase().indexOf('chính thức')>=0;}).length;
    html+='<div class="card" style="margin-top:16px"><h3>Tiến độ lên cấp</h3>'
      +'<div style="font-weight:600;font-size:13px;margin-bottom:3px">Mốc 1 · Doanh thu mềm luỹ kế</div>'
      +'<div class="muted" style="font-size:12px;margin-bottom:5px">Chuẩn 50tr mềm/tháng × '+nM+' tháng = '+short(dtmStd)+'</div>'+pbar(dtmPct, dtmPct>=100?'#16D865':null)
      +'<div class="muted" style="margin:4px 0 14px">'+short(cum.soft)+' / '+short(dtmStd)+' = <b>'+Math.round(dtmPct)+'%</b></div>'
      +'<div style="font-weight:600;font-size:13px;margin-bottom:3px">Mốc 2 · Chuyên gia (xét theo nửa năm)</div>'
      +'<div class="muted" style="font-size:12px;margin-bottom:5px">'+(half===1?'Nửa 1 (T1–6): chuẩn 500tr':'Cả năm: chuẩn 1 tỷ')+'</div>'+pbar(expPct, expPct>=100?'#16D865':null)
      +'<div class="muted" style="margin:4px 0 12px">'+short(expCum)+' / '+short(expStd)+' = <b>'+Math.round(expPct)+'%</b></div>'
      +'<div style="font-size:13px;margin-bottom:4px">Kèm cặp lên chính thức: <b>'+official+'/3</b></div>'
      +(mentors.length? mentors.map(function(m){ var ok=(m.status||'').toLowerCase().indexOf('chính thức')>=0; return '<div style="font-size:13px;margin:2px 0">'+(ok?'✓ ':'· ')+esc(m.mentee_name)+' <span class="muted">'+esc(m.status||'')+'</span></div>'; }).join('') : '<div class="muted">Chưa kèm cặp ai.</div>')
      +'</div>';
    // chất lượng đơn
    var netT=cum.total-cum.renew, netS=cum.soft-cum.renew, avgKH=cum.merch?netT/cum.merch:0, softKH=cum.merch?netS/cum.merch:0, lastMerch=0;
    revs.forEach(function(r){ if(r.period===lpr) lastMerch=Number(r.merchants)||0; });
    html+='<div class="card" style="margin-top:16px"><h3>Chất lượng đơn &amp; khách hàng</h3>'
      +'<div class="muted" style="font-size:12px;margin-bottom:8px">Doanh thu/khách đã trừ doanh thu gia hạn.</div>'
      +'<div class="grid" style="margin-top:0"><div style="background:#F0F4F9;border-radius:10px;padding:12px"><div class="muted">Số KH đã chinh phục</div><div class="big" style="font-size:24px">'+Math.round(cum.merch)+'</div></div>'
      +'<div style="background:#F0F4F9;border-radius:10px;padding:12px"><div class="muted">DT / khách · DT mềm / khách</div><div style="font-weight:700;font-size:18px;color:#007AFF">'+tr1(avgKH)+' · '+tr1(softKH)+'</div></div></div></div>';
    // đóng góp phòng
    if(prof.dept && /^Phòng/.test(prof.dept)){
      var pr=peers.filter(function(r){return r.period===lpr;}), phongTot=0, myAmt=0;
      pr.forEach(function(r){ phongTot+=Number(r.amount)||0; }); revs.forEach(function(r){ if(r.period===lpr) myAmt=Number(r.amount)||0; });
      var pct7=phongTot?myAmt/phongTot*100:0, rk=1; pr.forEach(function(r){ if((Number(r.amount)||0)>myAmt) rk++; });
      html+='<div class="card" style="margin-top:16px"><h3>Đóng góp vào phòng · tháng '+esc(lpr||'')+'</h3>'
        +'<div class="muted" style="font-size:12px;margin-bottom:5px">'+esc(prof.dept)+' · '+pr.length+' người</div>'+pbar(pct7,'#007AFF')
        +'<div class="muted" style="margin:4px 0 8px">'+short(myAmt)+' / '+short(phongTot)+' = <b>'+Math.round(pct7)+'%</b> doanh thu phòng</div>'
        +'<div style="font-size:13px">Xếp thứ <b>'+rk+'</b> / '+pr.length+' trong phòng</div></div>';
    }

    document.getElementById('root').innerHTML=html;

    var ctx=document.getElementById('radar');
    new Chart(ctx,{type:'radar',data:{labels:labels,datasets:[{label:'% thành thạo',data:data,fill:true,backgroundColor:'rgba(0,122,255,.18)',borderColor:'#007AFF',pointBackgroundColor:'#16D865',borderWidth:2}]},
      options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:25,backdropColor:'transparent'},pointLabels:{font:{size:12}}}},plugins:{legend:{display:false}}}});

    var clabels=_ds.map(function(x){return x.domain;}), cdata=_ds.map(function(x){return x.pct;});
    new Chart(document.getElementById('radar2'),{type:'radar',data:{labels:clabels,datasets:[{label:'%',data:cdata,fill:true,backgroundColor:'rgba(0,122,255,.16)',borderColor:'#007AFF',pointBackgroundColor:'#16D865',borderWidth:2}]},
      options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:25,backdropColor:'transparent'},pointLabels:{font:{size:9}}}},plugins:{legend:{display:false}}}});
  }
